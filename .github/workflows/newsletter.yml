name: Generate Daily Newsletter

on:
  schedule:
    # Run every day at 9 AM UTC (adjust for your timezone)
    - cron: '0 9 * * *'
  workflow_dispatch:  # Allow manual trigger
  push:
    branches: [ main ]

jobs:
  generate-newsletter:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pages: write
      id-token: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Create config file with secrets
      run: |
        cat > config.json << EOF
        {
          "newsletter": {
            "title": "Dunlap Daily",
            "description": "Daily insights and updates from Dunlap",
            "author": "Dunlap Team",
            "link": "https://${{ github.repository_owner }}.github.io/dunlap_daily",
            "language": "en-US"
          },
          "onedrive": {
            "client_id": "${{ secrets.ONEDRIVE_CLIENT_ID }}",
            "client_secret": "${{ secrets.ONEDRIVE_CLIENT_SECRET }}",
            "tenant_id": "${{ secrets.ONEDRIVE_TENANT_ID }}",
            "file_path": "${{ secrets.ONEDRIVE_FILE_PATH }}",
            "refresh_token": "${{ secrets.ONEDRIVE_REFRESH_TOKEN }}"
          },
          "github": {
            "repository": "${{ github.repository }}",
            "pages_url": "https://${{ github.repository_owner }}.github.io/dunlap_daily",
            "token": "${{ secrets.GITHUB_TOKEN }}"
          },
          "automation": {
            "run_time": "09:00",
            "timezone": "America/New_York"
          }
        }
        EOF
        
    - name: Generate newsletter
      run: python dunlap_daily.py
      
    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add docs/
        git add config.json || true
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Auto-update newsletter - $(date '+%Y-%m-%d')"
          git push
        fi
        
  deploy:
    needs: generate-newsletter
    runs-on: ubuntu-latest
    
    permissions:
      pages: write
      id-token: write
      
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
      
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Pages
      uses: actions/configure-pages@v3
      
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v2
      with:
        path: './docs'
        
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v2